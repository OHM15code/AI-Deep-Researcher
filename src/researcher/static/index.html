<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Researcher | Premium Synthesis</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="glass-container">
        <header>
            <h1>AI <span class="gradient-text">Researcher</span></h1>
            <p class="subtitle">Autonomous Deep Intelligence Synthesis</p>
        </header>

        <section class="search-section">
            <div class="input-group">
                <input type="text" id="topicInput" placeholder="Enter research topic..." autocomplete="off">
                <button id="generateBtn" class="primary-btn">
                    <span class="btn-text">Generate Research</span>
                    <div class="spinner hidden"></div>
                </button>
            </div>
        </section>

        <section id="statusSection" class="status-section hidden">
            <div class="status-card">
                <div class="loader-ring"></div>
                <p id="statusMsg">Initializing research nodes...</p>
            </div>
        </section>

        <section id="resultSection" class="result-section hidden">
            <div class="success-card">
                <div class="success-icon">✓</div>
                <h2>Research Complete</h2>
                <p>Your comprehensive report is ready for review.</p>
                <div class="action-group">
                    <a href="/download" class="download-btn" id="downloadLink">
                        Download PDF
                    </a>
                    <button id="resetBtn" class="secondary-btn">New Research</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>Powered by CrewAI & FastAPI</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
